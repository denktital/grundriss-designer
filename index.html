<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grundriss-Designer Pro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">▦</span> Grundriss-Designer</div>
    <nav id="menubar" class="menubar"></nav>
    <div class="spacer"></div>
    <div class="view-tabs">
      <button id="tab2d" class="vtab active">2D-Plan</button>
      <button id="tab3d" class="vtab">3D-Ansicht</button>
    </div>
    <div id="layerTabs" class="view-tabs layer-tabs">
      <button id="layerArch" class="vtab active">Grundriss</button>
      <button id="layerElec" class="vtab">Elektro</button>
    </div>
    <div id="d3controls" class="d3-controls" style="display:none">
      <select id="d3mode">
        <option value="all">Alle Geschosse</option>
        <option value="floor">Aktuelles Geschoss</option>
      </select>
      <button id="d3rebuild" class="icon-btn" title="Aktualisieren">⟳</button>
    </div>
    <div class="top-actions">
      <button id="undoBtn" class="icon-btn" title="Rückgängig (Strg+Z)">↶</button>
      <button id="redoBtn" class="icon-btn" title="Wiederholen (Strg+Y)">↷</button>
      <div id="designWrap" class="design-wrap">
        <button id="designBtn" class="icon-btn" title="Design & Farben">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 100 18c.9 0 1.4-.8 1.4-1.5 0-.4-.2-.7-.5-1-.3-.3-.4-.6-.4-1 0-.8.6-1.4 1.4-1.4H16a5 5 0 005-5c0-4.4-4-8.1-9-8.1z"/><circle cx="7.5" cy="11.5" r="1"/><circle cx="11" cy="7.5" r="1"/><circle cx="15.5" cy="8.5" r="1"/></svg>
        </button>
        <div id="designPanel" class="design-panel"></div>
      </div>
      <button id="togglePanel" class="icon-btn" title="Seitenleiste ein/aus">⮜</button>
    </div>
  </header>

  <main class="workspace">
    <aside id="toolbar" class="toolbar"></aside>

    <section class="stage">
      <div id="floors" class="floors"></div>
      <div id="canvasWrap" class="canvas-wrap">
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="zoom-cluster">
          <button id="zoomOut" title="Verkleinern">−</button>
          <button id="zoomFit" title="Einpassen">⤢</button>
          <button id="zoomIn" title="Vergrößern">+</button>
        </div>
      </div>
      <div id="view3dWrap" class="view3d-wrap" style="display:none">
        <div id="view3d"></div>
        <div class="d3-hint">Ziehen: drehen · Mausrad: zoom · Rechte Maustaste: verschieben</div>
      </div>
    </section>

    <aside id="sidebar" class="sidebar">
      <div id="sideTabs" class="side-tabs">
        <button class="side-tab active" data-tab="props">Eigenschaften</button>
        <button class="side-tab" data-tab="lib">Bibliothek</button>
      </div>
      <div id="sideBody" class="side-body"></div>
    </aside>
  </main>

  <footer class="statusbar">
    <span id="status"></span>
    <span class="hint-keys">Rechtsklick: Kontextmenü · Leertaste+Ziehen oder mittlere Maustaste: Pan · Mausrad: Zoom · Doppelklick: Zeichnen abschließen</span>
  </footer>

  <script src="lib/three.min.js"></script>
  <script src="lib/OrbitControls.js"></script>
  <script src="lib/GLTFExporter.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="js/core.js"></script>
  <script src="js/library.js"></script>
  <script src="js/electrical.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/view2d.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/contextmenu.js"></script>
  <script src="js/view3d.js"></script>
  <script src="js/io.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
